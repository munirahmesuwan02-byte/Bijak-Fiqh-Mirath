<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video – Tajuk 6</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #dce8de;
      --card:      #ffffff;
      --orange:    #c9884e;
      --orange-dk: #b5703a;
      --green:     #4a7c59;
      --shadow:    4px 4px 0 #b5703a;
      --radius:    14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 16px 60px;
    }

    /* ── Corner Nav ── */
    .corner-btn {
      position: fixed;
      width: 46px; height: 46px;
      border-radius: 12px;
      background: #ffffff;
      border: 2px solid var(--orange);
      box-shadow: 3px 3px 0 var(--orange-dk);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 100;
      transition: transform .15s, box-shadow .15s;
      text-decoration: none;
    }
    .corner-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--orange-dk); }
    .corner-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--orange-dk); }
    .corner-btn svg { fill: none; stroke: var(--orange-dk); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; width: 22px; height: 22px; }
    .btn-home { top: 16px; left: 16px; }
    .btn-exit { top: 16px; right: 16px; }

    /* ── Header ── */
    .page-header { text-align: center; margin-top: 16px; margin-bottom: 28px; }
    .page-title {
      font-family: 'Nunito', sans-serif;
      font-size: 1.7rem; font-weight: 900;
      color: var(--green); line-height: 1.2;
    }
    .page-subtitle { font-size: .93rem; color: #5a6e5c; margin-top: 6px; }

    /* ── Part Selector ── */
    .part-selector {
      display: flex; gap: 12px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 26px;
    }
    .part-btn {
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: .95rem;
      padding: 10px 28px; border-radius: 30px;
      border: 2.5px solid var(--orange-dk);
      background: var(--card); color: var(--orange-dk);
      cursor: pointer; box-shadow: 3px 3px 0 var(--orange-dk); transition: all .15s;
    }
    .part-btn:hover { background: #fff3e8; transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--orange-dk); }
    .part-btn.active {
      background: linear-gradient(135deg, var(--orange), var(--orange-dk));
      color: #fff; transform: translate(1px,1px); box-shadow: 2px 2px 0 var(--orange-dk);
    }

    /* ── Video Card ── */
    .video-card {
      width: 100%; max-width: 820px;
      background: var(--card);
      border: 2.5px solid var(--orange);
      border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
    }
    .video-card-header {
      background: linear-gradient(135deg, var(--orange), var(--orange-dk));
      padding: 14px 20px; display: flex; align-items: center; gap: 12px;
    }
    .video-card-header .part-label {
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 1rem; color: #fff;
    }
    .video-card-header .video-title { font-size: .88rem; color: rgba(255,255,255,.85); }

    /* ── Video Wrapper ── */
    .video-wrapper {
      position: relative; width: 100%; padding-top: 56.25%; background: #111;
    }
    .video-wrapper iframe,
    .video-wrapper video {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none;
    }
    .video-wrapper video { display: block; }

    /* ── Placeholder ── */
    .video-placeholder {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1a2a1c; color: rgba(255,255,255,.55); gap: 14px;
    }
    .video-placeholder svg { width: 64px; height: 64px; fill: rgba(255,255,255,.25); }
    .video-placeholder p { font-size: .9rem; font-family: 'Nunito', sans-serif; }

    /* ── Custom Controls Bar ── */
    .custom-controls {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      background: #f9f1e8;
      border-top: 1.5px solid #f0e4d4;
    }
    .custom-controls.visible { display: flex; }

    /* Play/Pause button */
    .ctrl-playpause {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), var(--orange-dk));
      border: 2px solid var(--orange-dk);
      box-shadow: 3px 3px 0 var(--orange-dk);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: transform .12s, box-shadow .12s;
    }
    .ctrl-playpause:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--orange-dk); }
    .ctrl-playpause:active { transform: translate(1px,1px); box-shadow: 2px 2px 0 var(--orange-dk); }
    .ctrl-playpause svg { fill: #fff; width: 20px; height: 20px; }

    /* Time display */
    .ctrl-time {
      font-family: 'Nunito', sans-serif; font-size: .8rem;
      color: var(--orange-dk); font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }

    /* Seek bar */
    .ctrl-seek {
      flex: 1; height: 6px; border-radius: 4px;
      accent-color: var(--orange);
      cursor: pointer;
    }

    /* Volume icon + slider */
    .ctrl-vol-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .ctrl-vol-wrap svg { fill: var(--orange-dk); width: 18px; height: 18px; flex-shrink: 0; }
    .ctrl-volume {
      width: 70px; height: 6px; border-radius: 4px;
      accent-color: var(--orange); cursor: pointer;
    }

    /* Fullscreen button */
    .ctrl-fullscreen {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--card);
      border: 2px solid var(--orange-dk);
      box-shadow: 2px 2px 0 var(--orange-dk);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: background .12s;
    }
    .ctrl-fullscreen:hover { background: #fff3e8; }
    .ctrl-fullscreen svg { fill: var(--orange-dk); width: 16px; height: 16px; }
  </style>
</head>
<body>

<!-- Corner Buttons -->
<a href="MenuVideo.html" class="corner-btn btn-home" title="Laman Utama">
  <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
</a>
<a href="keluar.html" class="corner-btn btn-exit" title="Keluar">
  <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
</a>

<!-- Header -->
<div class="page-header">
  <h1 class="page-title">Topik 6: Isu Kontemporari Tentang Mirath</h1>
</div>

<!-- Video Card -->
<div class="video-card">
  <div class="video-card-header">
    <span class="part-label" id="partLabel">Topik 6</span>
    <span class="video-title" id="videoTitle">Isu Kontemporari Tentang Mirath</span>
  </div>

  <div class="video-wrapper" id="videoWrapper">
    <div class="video-placeholder" id="videoPlaceholder">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <p id="placeholderText">Topik 6</p>
      <p style="font-size:.75rem">Gantikan src dengan pautan video sebenar</p>
    </div>
  </div>

  <!-- Custom Controls (shown only for local video) -->
  <div class="custom-controls" id="customControls">
    <button class="ctrl-playpause" id="btnPlayPause" onclick="togglePlay()" title="Main / Jeda">
      <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <span class="ctrl-time" id="ctrlTime">0:00 / 0:00</span>
    <input class="ctrl-seek" id="seekBar" type="range" min="0" value="0" step="0.1"
           oninput="onSeek()" title="Kedudukan video"/>
    <div class="ctrl-vol-wrap">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <input class="ctrl-volume" id="volBar" type="range" min="0" max="1" step="0.05" value="1"
             oninput="onVolume()" title="Kelantangan"/>
    </div>
    <button class="ctrl-fullscreen" onclick="toggleFullscreen()" title="Skrin penuh">
      <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>
  </div>

</div>

<script>
  const parts = [
    { label:"Topik 6",      src:"tajuk6_video.mp4" },
  ];

  let current = 0;
  let videoEl = null;

  function selectPart(n) { current = n - 1; render(); }

  function render() {
    const p = parts[current];

    document.querySelectorAll('.part-btn').forEach((btn, i) =>
      btn.classList.toggle('active', i === current));

    document.getElementById('partLabel').textContent  = p.label;
    document.getElementById('videoTitle').textContent = p.title;

    const wrapper = document.getElementById('videoWrapper');
    const old = wrapper.querySelector('iframe, video');
    if (old) old.remove();
    videoEl = null;

    const controls = document.getElementById('customControls');
    controls.classList.remove('visible');
    resetControls();

    if (p.src) {
      const isYT = p.src.includes('youtube') || p.src.includes('youtu.be');
      wrapper.querySelector('.video-placeholder').style.display = 'none';

      if (isYT) {
        const iframe = document.createElement('iframe');
        iframe.src = p.src + '?rel=0';
        iframe.allowFullscreen = true;
        iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
        wrapper.appendChild(iframe);
      } else {
        const vid = document.createElement('video');
        vid.src = p.src;
        vid.controls = false;
        wrapper.appendChild(vid);
        videoEl = vid;
        bindVideoEvents(vid);
        controls.classList.add('visible');
      }
    } else {
      wrapper.querySelector('.video-placeholder').style.display = 'flex';
      document.getElementById('placeholderText').textContent = `Tajuk 6 – ${p.label}`;
    }
  }

  function bindVideoEvents(vid) {
    vid.addEventListener('timeupdate', updateSeekBar);
    vid.addEventListener('loadedmetadata', () => {
      document.getElementById('seekBar').max = vid.duration;
      updateTimeDisplay();
    });
    vid.addEventListener('play',  () => setPlayIcon(false));
    vid.addEventListener('pause', () => setPlayIcon(true));
    vid.addEventListener('ended', () => setPlayIcon(true));
  }

  function togglePlay() {
    if (!videoEl) return;
    videoEl.paused ? videoEl.play() : videoEl.pause();
  }

  function onSeek() {
    if (!videoEl) return;
    videoEl.currentTime = document.getElementById('seekBar').value;
  }

  function onVolume() {
    if (!videoEl) return;
    videoEl.volume = document.getElementById('volBar').value;
  }

  function toggleFullscreen() {
    const wrapper = document.getElementById('videoWrapper');
    if (!document.fullscreenElement) {
      wrapper.requestFullscreen && wrapper.requestFullscreen();
    } else {
      document.exitFullscreen && document.exitFullscreen();
    }
  }

  function updateSeekBar() {
    if (!videoEl) return;
    document.getElementById('seekBar').value = videoEl.currentTime;
    updateTimeDisplay();
  }

  function updateTimeDisplay() {
    if (!videoEl) return;
    const cur = fmtTime(videoEl.currentTime);
    const dur = isNaN(videoEl.duration) ? '0:00' : fmtTime(videoEl.duration);
    document.getElementById('ctrlTime').textContent = `${cur} / ${dur}`;
  }

  function fmtTime(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  function setPlayIcon(showPlay) {
    document.getElementById('iconPlay').style.display  = showPlay ? '' : 'none';
    document.getElementById('iconPause').style.display = showPlay ? 'none' : '';
  }

  function resetControls() {
    document.getElementById('seekBar').value = 0;
    document.getElementById('seekBar').max   = 100;
    document.getElementById('volBar').value  = 1;
    document.getElementById('ctrlTime').textContent = '0:00 / 0:00';
    setPlayIcon(true);
  }

  render();
</script>
</body>
</html>

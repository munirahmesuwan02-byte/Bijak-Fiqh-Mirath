<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pilihan Percubaan Negeri</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sage:       #dce8de;
      --sage-dark:  #b8cebb;
      --sage-deep:  #7a9e80;
      --orange:     #c9884e;
      --orange-dark:#b5703a;
      --orange-deep:#8a4e20;
      --cream:      #fdf8f2;
      --white:      #ffffff;
      --text-dark:  #3a2e22;
      --text-mid:   #6b5040;
      --gold:       #d4a843;
      --green-pill: #4a8c5c;
      --shadow:     4px 4px 0px #b5703a;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--sage);
      background-image:
        radial-gradient(circle at 15% 20%, rgba(201,136,78,0.08) 0%, transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(122,158,128,0.15) 0%, transparent 40%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 0 1rem;
    }

    .nav-icon {
      position: fixed;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--white);
      border: 2px solid var(--orange);
      border-radius: 12px;
      box-shadow: 3px 3px 0 var(--orange-dark);
      cursor: pointer;
      z-index: 100;
      transition: transform .15s, box-shadow .15s;
      text-decoration: none;
    }
    .nav-icon:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--orange-dark); }
    .nav-icon:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--orange-dark); }
    .nav-icon svg { width: 24px; height: 24px; fill: none; stroke: var(--orange-dark); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .nav-home { top: 18px; left: 18px; }
    .nav-exit { top: 18px; right: 18px; }
    .nav-icon.sound { top: 18px; right: 76px; }
    .nav-icon.sound .icon-off { display: none; }
    .nav-icon.sound.muted .icon-on { display: none; }
    .nav-icon.sound.muted .icon-off { display: block; }

    .header {
      text-align: center;
      margin-bottom: clamp(12px, 2.5vh, 24px);
    }
    .header-badge {
      display: inline-block;
      background: var(--orange);
      color: var(--cream);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 8px;
    }
    .header h1 {
      font-size: clamp(20px, 3.5vw, 28px);
      font-weight: 900;
      color: var(--text-dark);
      line-height: 1.2;
    }
    .header h1 span { color: var(--orange-dark); }
    .header p {
      font-size: clamp(12px, 1.5vw, 14px);
      color: var(--text-mid);
      margin-top: 4px;
      font-family: 'Nunito Sans', sans-serif;
    }

    .grid-top {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(10px, 1.8vw, 18px);
      width: 100%;
      max-width: 860px;
      margin-bottom: clamp(10px, 1.8vw, 18px);
    }

    .grid-bottom {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: clamp(10px, 1.8vw, 18px);
      width: calc((100% / 3 * 2) + clamp(10px, 1.8vw, 18px));
      max-width: calc((860px / 3 * 2) + clamp(10px, 1.8vw, 18px));
    }

    .card {
      background: var(--white);
      border: 2.5px solid var(--orange);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: clamp(12px, 1.8vh, 20px) clamp(12px, 1.5vw, 18px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: transform .15s ease, box-shadow .15s ease;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--orange), var(--gold));
      border-radius: 13px 13px 0 0;
    }
    .card:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0px var(--orange-dark); }
    .card:active { transform: translate(2px,2px); box-shadow: 2px 2px 0px var(--orange-dark); }

    .card-icon {
      width: clamp(48px, 6vw, 64px);
      height: clamp(48px, 6vw, 64px);
      border-radius: 50%;
      background: var(--sage);
      border: 2px solid var(--sage-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(22px, 2.8vw, 32px);
      flex-shrink: 0;
    }
    .card-state {
      font-size: clamp(13px, 1.6vw, 16px);
      font-weight: 800;
      color: var(--text-dark);
      text-align: center;
      line-height: 1.2;
    }
    .card-year {
      font-size: clamp(11px, 1.2vw, 13px);
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 600;
      color: var(--text-mid);
    }
    .card-pill {
      display: inline-block;
      background: var(--sage);
      color: var(--green-pill);
      font-size: clamp(10px, 1.1vw, 12px);
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1.5px solid var(--sage-dark);
    }

    .btn-start {
      margin-top: 2px;
      padding: 8px 20px;
      border-radius: 50px;
      border: none;
      background: var(--green-pill);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 0 #2f6240;
      text-decoration: none;
      display: inline-block;
      transition: background .15s, transform .15s, box-shadow .15s;
    }
    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #2f6240;
    }
    .btn-start:active {
      transform: translateY(1px);
      box-shadow: 0 2px 0 #2f6240;
    }

    .hint {
      margin-top: clamp(10px, 1.5vh, 16px);
      font-size: clamp(11px, 1.2vw, 13px);
      color: var(--text-mid);
      font-family: 'Nunito Sans', sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>

  <a href="MenuPenilaian.html" class="nav-icon nav-home" title="Kembali">
    <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
  </a>

  <a href="index.html" class="nav-icon nav-exit" title="Laman Utama">
    <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
  </a>

  <button class="nav-icon sound" id="soundToggle" onclick="toggleSound()" title="Bunyi">
    <svg class="icon-on" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg>
    <svg class="icon-off" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
  </button>

  <div class="header">
    <h1>Pilihan <span>Trial Negeri</span></h1>
    <p>Pilih negeri untuk memulakan latihan soalan peperiksaan</p>
  </div>

  <!-- Row 1: 3 cards -->
  <div class="grid-top">
    <div class="card">
      <div class="card-icon">🌾</div>
      <div class="card-state">Kedah</div>
      <div class="card-year">Trial 2026</div>
      <a href="TrialKedah.html" class="btn-start">Mulakan</a>
    </div>

    <div class="card">
      <div class="card-icon">🏔️</div>
      <div class="card-state">Perak</div>
      <div class="card-year">Trial 2026</div>
      <a href="TrialPerak.html" class="btn-start">Mulakan</a>
    </div>

    <div class="card">
      <div class="card-icon">🐘</div>
      <div class="card-state">Pahang</div>
      <div class="card-year">Trial 2026</div>
      <a href="TrialPahang.html" class="btn-start">Mulakan</a>
    </div>
  </div>

  <!-- Row 2: 2 cards centred -->
  <div class="grid-bottom">
    <div class="card">
      <div class="card-icon">🐢</div>
      <div class="card-state">Terengganu</div>
      <div class="card-year">Trial 2026</div>
      <a href="TrialTerengganu.html" class="btn-start">Mulakan</a>
    </div>

    <div class="card">
      <div class="card-icon">🦅</div>
      <div class="card-state">Sarawak</div>
      <div class="card-year">Trial 2026</div>
      <a href="TrialSarawak.html" class="btn-start">Mulakan</a>
    </div>
  </div>  <!-- Background music -->
  <audio id="bgMusic" src="background_music.mp3" loop preload="auto"></audio>

  <script>
    const bgMusic = document.getElementById('bgMusic');
    bgMusic.volume = 1.0;

    // ─── Sound on/off toggle (persists across pages) ─────────────────────────
    let soundMuted = localStorage.getItem('bijakSoundMuted') === 'true';

    function applySoundState() {
      bgMusic.muted = soundMuted;
      const btn = document.getElementById('soundToggle');
      if (btn) btn.classList.toggle('muted', soundMuted);
    }

    function toggleSound() {
      soundMuted = !soundMuted;
      localStorage.setItem('bijakSoundMuted', soundMuted);
      applySoundState();
    }

    applySoundState();
    document.addEventListener('DOMContentLoaded', applySoundState);

    // Try to autoplay as soon as the page loads
    function tryAutoplay() {
      const playPromise = bgMusic.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          // Autoplay blocked by browser — start on first user interaction
          const startOnInteraction = () => {
            bgMusic.play().catch(() => {});
            document.removeEventListener('click', startOnInteraction);
            document.removeEventListener('keydown', startOnInteraction);
            document.removeEventListener('touchstart', startOnInteraction);
          };
          document.addEventListener('click', startOnInteraction);
          document.addEventListener('keydown', startOnInteraction);
          document.addEventListener('touchstart', startOnInteraction);
        });
      }
    }
    tryAutoplay();
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keluar</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif;
      background: #dce8de;
      position: relative;
      overflow: hidden;
    }

    .bg-blobs {
      position: fixed; inset: 0; z-index: 0;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.55;
    }
    .blob-1 { width: 380px; height: 380px; background: #c8deca; top: -80px; left: -80px; }
    .blob-2 { width: 300px; height: 300px; background: #a8c8ac; bottom: -60px; right: -60px; }
    .blob-3 { width: 220px; height: 220px; background: #e0ede2; top: 40%; left: 55%; }

    .card {
      position: relative; z-index: 1;
      width: min(380px, 88vw);
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(22px) saturate(1.4);
      -webkit-backdrop-filter: blur(22px) saturate(1.4);
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 28px;
      padding: 48px 36px 40px;
      box-shadow:
        0 8px 40px rgba(80, 120, 90, 0.18),
        0 1.5px 0 rgba(255,255,255,0.55) inset,
        0 -1px 0 rgba(140,180,150,0.15) inset;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      animation: riseIn .45s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(18px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .icon-wrap {
      width: 64px; height: 64px;
      background: rgba(255,255,255,0.35);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(100,130,160,0.12);
    }

    .icon-wrap svg {
      width: 30px; height: 30px;
      stroke: rgba(40, 90, 55, 0.85);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .text-block {
      text-align: center;
    }

    .text-block h2 {
      font-size: 19px;
      font-weight: 700;
      color: rgba(25, 60, 35, 0.92);
      letter-spacing: -0.2px;
      margin-bottom: 8px;
    }

    .text-block p {
      font-size: 14px;
      color: rgba(50, 90, 60, 0.7);
      line-height: 1.6;
    }

    .btn-row {
      display: flex;
      gap: 14px;
      width: 100%;
    }

    .btn {
      flex: 1;
      height: 48px;
      border: none;
      border-radius: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
      letter-spacing: 0.1px;
    }

    .btn-cancel {
      background: rgba(255,255,255,0.4);
      color: rgba(30, 75, 45, 0.85);
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: 0 2px 10px rgba(80,130,95,0.1);
    }
    .btn-cancel:hover {
      background: rgba(255,255,255,0.55);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(80,130,95,0.16);
    }
    .btn-cancel:active {
      transform: translateY(1px);
      box-shadow: none;
    }

    .btn-confirm {
      background: rgba(40, 100, 60, 0.75);
      color: rgba(225, 245, 230, 0.95);
      border: 1px solid rgba(80,150,100,0.3);
      box-shadow: 0 2px 10px rgba(40,100,60,0.22);
      backdrop-filter: blur(6px);
    }
    .btn-confirm:hover {
      background: rgba(30, 80, 48, 0.88);
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(40,100,60,0.3);
    }
    .btn-confirm:active {
      transform: translateY(1px);
      box-shadow: none;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
    }
  </style>
</head>
<body>

  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="card">

    <div class="icon-wrap">
      <svg viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </div>

    <div class="text-block">
      <h2>Keluar dari sistem?</h2>
      <p>Adakah anda pasti ingin menamatkan<br>sesi semasa?</p>
    </div>

    <div class="divider"></div>

    <div class="btn-row">
      <button class="btn btn-cancel" onclick="goBack()">Tidak</button>
      <button class="btn btn-confirm" onclick="doLogout()">Ya, Keluar</button>
    </div>

  </div>

  <script>
    // Save the page that sent us here (set by calling pages via sessionStorage)
    // Falls back to document.referrer, then menu.html
    const returnPage = sessionStorage.getItem('keluarReturn') || document.referrer || 'menu.php';

    function goBack() {
      // Go back to wherever the user came from
      if (document.referrer) {
        history.back();
      } else {
        window.location.href = returnPage;
      }
    }

    function doLogout() {
      // Clear any saved session state
      sessionStorage.clear();
      localStorage.removeItem('soundOn');
      // Redirect to login / home page
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>

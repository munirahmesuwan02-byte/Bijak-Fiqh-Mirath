<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bijak Fiqh Mirath</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito Sans', 'Arial Black', sans-serif;
      background-color: #dce8de;
      color: #1e2620;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      background: #c9884e;
      border-bottom: none;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 62px;
    }
    .nav-logo {
      font-size: 1.1rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #fff3e8;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #4ac76e; }

    /* ── HERO ── */
    .hero {
      background: #dce8de;
      color: #1e2620;
      padding: 4rem 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }
    .hero-text {
      flex: 1;
      text-align: left;
      min-width: 0;
    }
    .hero-image {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }
    .hero-image img {
      width: 100%;
      max-width: 10000px;
      border-radius: 16px;
      animation: fadeUp 0.7s ease 0.5s both;
      display: block;
      margin: 0 auto;
    }
    .hero h1 {
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      line-height: 1.2;
      margin-bottom: 1.25rem;
      color: #1e2620;
    }
    .hero p {
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.75;
      color: #3a5040;
      max-width: 480px;
      margin: 0 0 2.2rem;
    }
    .hero p strong {
      color: #1e2620;
      font-weight: 900;
    }
    @media (max-width: 700px) {
      .hero { flex-direction: column; padding: 3rem 1.5rem; text-align: center; }
      .hero p { max-width: 100%; margin: 0 auto 2rem; }
      .hero-image { order: -1; }
    }

    /* Green pill button — same as index.html */
    .btn-primary {
      position: relative;
      display: inline-block;
      font-family: 'Nunito Sans', 'Arial Black', sans-serif;
      font-weight: 900;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #fff;
      padding: 0.75rem 2.2rem;
      border-radius: 50px;
      text-decoration: none;
      background: linear-gradient(180deg, #4ac76e 0%, #2da84e 50%, #1e8c3a 100%);
      box-shadow:
        0 6px 0 #156128,
        0 8px 20px rgba(0,0,0,.35),
        inset 0 2px 0 rgba(255,255,255,.3);
      text-shadow: 0 1px 2px rgba(0,0,0,.3);
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow:
        0 8px 0 #156128,
        0 12px 24px rgba(0,0,0,.4),
        inset 0 2px 0 rgba(255,255,255,.3);
    }
    .btn-primary:active {
      transform: translateY(4px);
      box-shadow:
        0 2px 0 #156128,
        0 4px 12px rgba(0,0,0,.3),
        inset 0 2px 0 rgba(255,255,255,.3);
    }

    /* ── GUIDE BUTTON ── */
    .btn-guide {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: #fff;
      border: 2px solid #c9884e;
      color: #c9884e;
      font-family: 'Nunito Sans', 'Arial Black', sans-serif;
      font-weight: 900;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 0.625rem 2.2rem;
      border-radius: 50px;
      box-shadow: 3px 3px 0 #b5703a;
      cursor: pointer;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .btn-guide svg { width: 20px; height: 20px; }
    .btn-guide:hover {
      transform: translateY(-2px);
      box-shadow: 4px 4px 0 #b5703a;
    }
    .btn-guide:active {
      transform: translateY(2px);
      box-shadow: 1px 1px 0 #b5703a;
    }

    /* ── GUIDE MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30, 38, 32, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1.5rem;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-content {
      position: relative;
      max-width: 1000px;
      width: 100%;
      max-height: 90vh;
      overflow: auto;
      background: #fff;
      border: 2px solid #c9884e;
      border-radius: 14px;
      box-shadow: 6px 6px 0 #b5703a;
      padding: 0.75rem;
      animation: fadeUp 0.3s ease both;
    }
    .modal-content img {
      width: 100%;
      display: block;
      border-radius: 10px;
    }
    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      background: #c9884e;
      color: #fff;
      border: none;
      border-radius: 50%;
      font-size: 1.2rem;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 3px 0 #9c6535, 0 2px 8px rgba(0,0,0,.25);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .12s ease;
      z-index: 1;
    }
    .modal-close:hover { transform: scale(1.08); }
    .modal-close:active { transform: scale(0.95); }

    /* ── FOOTER ── */
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      text-align: center;
      padding: 8px 16px;
      font-family: 'Nunito Sans', 'Arial Black', sans-serif;
      font-size: 12px;
      color: #5a6b5c;
      background: rgba(220, 232, 222, 0.85);
      backdrop-filter: blur(4px);
      letter-spacing: 0.5px;
      z-index: 50;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .hero h1 { letter-spacing: 1px; }
      .features h2 { letter-spacing: 0.8px; }
    }

    /* ── FADE IN ON SCROLL ── */
    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .fade-in-delay-1 { transition-delay: 0.1s; }
    .fade-in-delay-2 { transition-delay: 0.2s; }
    .fade-in-delay-3 { transition-delay: 0.3s; }
    .fade-in-delay-4 { transition-delay: 0.4s; }

    /* Hero elements animate on load */
    .hero-text h1   { animation: fadeUp 0.6s ease 0.1s both; }
    .hero-text p    { animation: fadeUp 0.6s ease 0.25s both; }
    .hero-actions { animation: fadeUp 0.6s ease 0.4s both; }
    .hero-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo">Bijak Fiqh Mirath</a>
    <ul class="nav-links">
      <li><a href="aboutus.html">Tentang kami</a></li>
    </ul>
  </nav>

  <!-- HERO -->
  <section style="background:#dce8de;">
    <div class="hero">
      <div class="hero-text">
        <h1>Pelajari Fiqh Mirath dengan Yakin</h1>
        <p>
          <strong>Bijak Fiqh Mirath</strong> — Dapatkan akses kepada bahan pembelajaran Fiqh Mirath, termasuk nota, video pembelajaran, aktiviti interaktif, dan kuiz secara <strong>PERCUMA</strong>.
        </p>
        <div class="hero-actions">
          <a href="menu.html" class="btn-primary">Mulakan Pembelajaran</a>
          <button type="button" class="btn-guide" onclick="openGuideModal()">
            <svg viewBox="0 0 24 24" fill="none" stroke="#c9884e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="16" x2="12" y2="12"/>
              <line x1="12" y1="8" x2="12.01" y2="8"/>
            </svg>
            Lihat Panduan Pengguna
          </button>
        </div>
      </div>
      <div class="hero-image">
        <img
          src="image1.png"
          alt="Belajar Fiqh dengan Yakin illustration"
        />
      </div>
    </div>
  </section>



  <!-- FOOTER -->
  <footer>
    &copy; 2026 Bijak Fiqh Mirath. Hak Cipta Terpelihara.
  </footer>
  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
  <!-- GUIDE MODAL -->
  <div class="modal-overlay" id="guideModal" onclick="if(event.target===this) closeGuideModal()">
    <div class="modal-content">
      <button type="button" class="modal-close" onclick="closeGuideModal()" aria-label="Tutup">&times;</button>
      <img src="panduan-pengguna.jpg" alt="Panduan Pengguna: Bijak Fiqh Mirath Courseware" />
    </div>
  </div>

  <script>
    function openGuideModal() {
      document.getElementById('guideModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeGuideModal() {
      document.getElementById('guideModal').classList.remove('active');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeGuideModal();
    });
  </script>

</body>
</html>
